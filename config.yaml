polling:
  software_rate_ms: 6000
  normal_logging_rate_ms: 60000
  enhanced_logging_rate_ms: 6000
  enable_enhanced_on_anomaly: true

logging:
  directory: "/var/log/gnsstrack"
  simulation_directory: "/tmp/gnsstrack"
  max_size_mb: 50
  max_backups: 100

i2c:
  bus: 1
  address: 0x42

rtc:
  bus: 1
  address: 0x68
  logging_rate_ms: 360000   # 6 minutes

status:
  listen_address: "127.0.0.1:8080"
